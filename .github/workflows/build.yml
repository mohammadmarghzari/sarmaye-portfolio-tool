name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Test shared engine module
        run: ./gradlew :core:test --console=plain

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug APK
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
        run: ./gradlew :composeApp:assembleDebug --console=plain
      - uses: actions/upload-artifact@v4
        with:
          name: portfolio360-android-debug
          path: composeApp/build/outputs/apk/debug/*.apk

  desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            path: composeApp/build/compose/binaries/main/deb/*.deb
          - os: windows-latest
            name: windows
            path: composeApp/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            name: macos
            path: composeApp/build/compose/binaries/main/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build desktop installer
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
        run: ./gradlew :composeApp:packageDistributionForCurrentOS --console=plain
      - uses: actions/upload-artifact@v4
        with:
          name: portfolio360-desktop-${{ matrix.name }}
          path: ${{ matrix.path }}
